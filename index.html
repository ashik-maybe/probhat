<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Md. Minhazul Haque" />
    <meta name="description" content="probhat-web - Type in Bangla using virtual Probhat keyboard on your browser, without installing anything." />

    <title>probhat-web | অনলাইন প্রভাত কিবোর্ড</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico?t=20160710">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?t=20160710">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.selector.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.preferences.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.inputmethods.min.js"></script>
    <style>
        body {
            font-family: 'Noto Serif Bengali', serif;
        }
        
        textarea {
            height: auto !important;
            width: 100%;
            font-size: 16px;
            font-family: 'Noto Serif Bengali', serif;
        }
        /* hide ime switch button */
        .imeselector {
            display: none !important;
        }
    </style>
    <script>
        $(document).ready(function() {
            // patch default settings so bn will be default without hitting Ctrl+M
            $.ime.preferences.registry.language = "bn";
            $.ime.preferences.registry.showSelector = false;
            $.ime.preferences.registry.imes = {
                bn: 'bn-probhat',
                en: 'system'
            };
            $.ime.preferences.getDefaultLanguage = function() {
                return "bn";
            };
            // load ime rules from cdn
            $('textarea').ime({
                languages: ['bn'],
                imePath: "https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.2.0/"
            });
            // copy text functionality
            $('#action-select-all').click(function() {
                $('#banglapad').select();
                try {
                    var successful = document.execCommand('copy');
                    var msg = successful ? 'Copied' : 'Failed to copy';
                    
                    // flash text after selection is copied to clipboard
                    $('#info').fadeIn(250);
                    $('#info').html(msg);
                    $('#info').fadeOut(2000);

                } catch (err) {
                    $('#info').html("Error copying");
                }
            });
            // clear textarea when clicked
            $('#action-clear-all').click(function() {
                $('#banglapad').val('');
                $('#banglapad').focus();
            });
            
            // set cursor on textarea when document is loaded
            $('#banglapad').focus();
        });
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="favicon.ico" alt="" width="30" height="24">
                অনলাইন প্রভাত কিবোর্ড
            </a>
            <a class="btn btn-dark" href="https://github.com/mdminhazulhaque/probhat-web">
                <i class="bi bi-github"></i> mdminhazulhaque/probhat-web
            </a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-12">
                <div class="mb-3">
                    <button class="btn btn-primary me-2" id="action-select-all">
                        <i class="bi bi-clipboard"></i> Copy
                    </button>
                    <button class="btn btn-outline-primary" id="action-clear-all">
                        <i class="bi bi-trash"></i> Clear
                    </button>
                    <span id="info" class="ms-3 text-success"></span>
                </div>

                <form>
                    <textarea id="banglapad" class="form-control" placeholder="এখানে বাংলা লিখুন, বাংলা-ইংরেজী সুইচ করতে Ctrl+M চাপুন" rows="15"></textarea>
                </form>
            </div>
        </div>
    </div>

</body>
