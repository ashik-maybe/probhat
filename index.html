<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="author" content="ashik-maybe" />
        <meta
            name="description"
            content="probhat-web - Type in Bangla using virtual Probhat keyboard on your browser, without installing anything."
        />
        <meta name="theme-color" content="#ffffff" />

        <title>অনলাইন প্রভাত কিবোর্ড</title>

        <link rel="icon" type="image/x-icon" href="favicon.ico?t=20160710" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png?t=20160710" />

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Plus Jakarta Sans", "system-ui", "sans-serif"],
                            bengali: ["Noto Sans Bengali", "system-ui", "sans-serif"],
                        },
                        colors: {
                            border: "hsl(var(--border))",
                            input: "hsl(var(--input))",
                            ring: "hsl(var(--ring))",
                            background: "hsl(var(--background))",
                            foreground: "hsl(var(--foreground))",
                            primary: {
                                DEFAULT: "hsl(var(--primary))",
                                foreground: "hsl(var(--primary-foreground))",
                            },
                            secondary: {
                                DEFAULT: "hsl(var(--secondary))",
                                foreground: "hsl(var(--secondary-foreground))",
                            },
                            muted: {
                                DEFAULT: "hsl(var(--muted))",
                                foreground: "hsl(var(--muted-foreground))",
                            },
                            accent: {
                                DEFAULT: "hsl(var(--accent))",
                                foreground: "hsl(var(--accent-foreground))",
                            },
                            card: {
                                DEFAULT: "hsl(var(--card))",
                                foreground: "hsl(var(--card-foreground))",
                            },
                        },
                        borderRadius: {
                            lg: "var(--radius)",
                            md: "calc(var(--radius) - 2px)",
                            sm: "calc(var(--radius) - 4px)",
                        },
                    },
                },
            };
        </script>
        <style>
            @layer base {
                :root {
                    --background: 0 0% 100%;
                    --foreground: 222.2 84% 4.9%;
                    --card: 0 0% 100%;
                    --card-foreground: 222.2 84% 4.9%;
                    --primary: 222.2 47.4% 11.2%;
                    --primary-foreground: 210 40% 98%;
                    --secondary: 210 40% 96.1%;
                    --secondary-foreground: 222.2 47.4% 11.2%;
                    --muted: 210 40% 96.1%;
                    --muted-foreground: 215.4 16.3% 46.9%;
                    --accent: 210 40% 96.1%;
                    --accent-foreground: 222.2 47.4% 11.2%;
                    --destructive: 0 84.2% 60.2%;
                    --destructive-foreground: 210 40% 98%;
                    --border: 214.3 31.8% 91.4%;
                    --input: 214.3 31.8% 91.4%;
                    --ring: 222.2 84% 4.9%;
                    --radius: 0.5rem;
                }
                body {
                    @apply bg-background text-foreground font-sans antialiased min-h-screen flex flex-col;
                    padding-top: env(safe-area-inset-top);
                    padding-bottom: env(safe-area-inset-bottom);
                }
                @media (prefers-reduced-motion: reduce) {
                    *,
                    *::before,
                    *::after {
                        animation-duration: 0.01ms !important;
                        transition-duration: 0.01ms !important;
                    }
                }
            }

            .imeselector {
                display: none !important;
            }

            #banglapad {
                min-height: clamp(250px, 50dvh, 400px);
                transition: box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }

            #layout-container {
                transition:
                    opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform-origin: top center;
            }
            #layout-container.state-hidden {
                opacity: 0;
                transform: translateY(-10px) scale(0.98);
                pointer-events: none;
            }
            #layout-container.state-visible {
                opacity: 1;
                transform: translateY(0) scale(1);
                box-shadow: 0 10px 40px -10px hsl(var(--ring) / 0.25);
                pointer-events: auto;
            }

            .touch-btn {
                @apply min-h-[44px] min-w-[44px] touch-action-manipulation select-none active:scale-[0.98] transition-transform;
            }

            #copy-toast {
                transition:
                    opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
        </style>

        <!-- Fonts & Font Awesome -->
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- jQuery & IME -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.selector.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.preferences.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.inputmethods.min.js"></script>

        <script>
            $(document).ready(function () {
                $.ime.preferences.registry.language = "bn";
                $.ime.preferences.registry.showSelector = false;
                $.ime.preferences.registry.imes = { bn: "bn-probhat", en: "system" };
                $.ime.preferences.getDefaultLanguage = () => "bn";
                $("textarea").ime({
                    languages: ["bn"],
                    imePath: "https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/",
                });

                $("#action-copy").click(function () {
                    navigator.clipboard
                        .writeText($("#banglapad").val())
                        .then(showCopiedToast)
                        .catch(console.error);
                });

                $("#action-clear").click(function () {
                    $("#banglapad").val("");
                    localStorage.removeItem("banglapad_content");
                    $("#banglapad").focus();
                });

                $("#banglapad").focus();
                const saved = localStorage.getItem("banglapad_content");
                if (saved) $("#banglapad").val(saved);
                $("#banglapad").on("input", function () {
                    localStorage.setItem("banglapad_content", $(this).val());
                });

                // Layout Toggle
                const layoutEl = document.getElementById("layout-container");
                const layoutBtn = document.getElementById("action-layout");
                let layoutOpen = false;

                function toggleLayout() {
                    layoutOpen = !layoutOpen;
                    if (layoutOpen) {
                        layoutEl.classList.remove("hidden", "state-hidden");
                        layoutEl.classList.add("state-visible");
                        layoutBtn.classList.add("bg-accent", "text-accent-foreground");
                        layoutBtn.setAttribute("aria-expanded", "true");
                    } else {
                        layoutEl.classList.add("state-hidden");
                        layoutBtn.classList.remove("bg-accent", "text-accent-foreground");
                        layoutBtn.setAttribute("aria-expanded", "false");
                        setTimeout(() => layoutEl.classList.add("hidden"), 300);
                    }
                    $("#banglapad").focus();
                }

                layoutBtn.addEventListener("click", toggleLayout);
                layoutEl.addEventListener("click", (e) => {
                    if (e.target === layoutEl) toggleLayout();
                });
                document.addEventListener("keydown", (e) => {
                    if (e.ctrlKey && e.key.toLowerCase() === "l") {
                        e.preventDefault();
                        toggleLayout();
                    }
                });

                // SVG Fallback
                const layoutImg = layoutEl.querySelector("img");
                if (layoutImg) layoutImg.onerror = () => (layoutImg.src = "probhat-layout.png");
            });

            function showCopiedToast() {
                const existing = document.getElementById("copy-toast");
                if (existing) existing.remove();
                const toast = document.createElement("div");
                toast.id = "copy-toast";
                toast.className =
                    "fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2.5 bg-foreground text-background text-sm font-medium rounded-lg shadow-lg opacity-0 translate-y-2";
                toast.innerHTML = '<i class="fa-solid fa-check"></i> Copied to clipboard';
                document.body.appendChild(toast);
                requestAnimationFrame(() => toast.classList.remove("opacity-0", "translate-y-2"));
                setTimeout(() => {
                    toast.classList.add("opacity-0", "translate-y-2");
                    setTimeout(() => toast.remove(), 200);
                }, 2000);
            }
        </script>
    </head>

    <body>
        <!-- Navbar (compact: h-14 = 56px) -->
        <nav class="border-b bg-background/80 backdrop-blur-md sticky top-0 z-40">
            <div
                class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between"
            >
                <div class="flex items-center gap-3">
                    <img src="favicon.ico" alt="Logo" class="w-7 h-7" />
                    <span class="font-bold text-base tracking-tight">অনলাইন প্রভাত কিবোর্ড</span>
                </div>
                <a
                    href="https://github.com/ashik-maybe/probhat-online"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 hover:bg-accent hover:text-accent-foreground h-9 w-9 touch-btn"
                    aria-label="View source on GitHub"
                >
                    <i class="fa-brands fa-github text-base"></i>
                </a>
            </div>
        </nav>

        <!-- Main -->
        <main
            class="flex-1 container max-w-5xl mx-auto px-4 py-6 sm:py-8 sm:px-6 lg:px-8 flex flex-col gap-4"
        >
            <!-- Toolbar -->
            <div
                class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-3"
            >
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <button
                        id="action-copy"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 w-full sm:w-auto gap-2 touch-btn"
                        aria-label="Copy text"
                    >
                        <i class="fa-regular fa-clipboard"></i>
                        <span class="hidden sm:inline">Copy</span>
                    </button>
                    <button
                        id="action-clear"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 w-full sm:w-auto gap-2 touch-btn"
                        aria-label="Clear text"
                    >
                        <i class="fa-solid fa-trash"></i>
                        <span class="hidden sm:inline">Clear</span>
                    </button>
                </div>
                <button
                    id="action-layout"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 gap-2 w-full sm:w-auto touch-btn"
                    aria-expanded="false"
                    aria-controls="layout-container"
                    aria-label="Toggle keyboard layout"
                >
                    <i class="fa-solid fa-keyboard"></i>
                    <span class="hidden sm:inline">Layout</span>
                </button>
            </div>

            <!-- Editor -->
            <div class="relative w-full">
                <textarea
                    id="banglapad"
                    class="w-full rounded-lg border border-input bg-background px-4 py-3 text-lg ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 font-bengali resize-y shadow-sm hover:shadow-md focus:shadow-lg"
                    placeholder="এখানে বাংলা লিখুন..."
                    aria-label="Bangla text input area"
                    enterkeyhint="go"
                    inputmode="text"
                    autocapitalize="sentences"
                    spellcheck="true"
                ></textarea>

                <div
                    id="layout-container"
                    class="hidden mt-4 p-4 bg-card rounded-lg border border-input"
                    role="region"
                    aria-label="Probhat keyboard layout reference"
                >
                    <div class="flex justify-center overflow-x-auto">
                        <img
                            src="KB-Bengali-Probhat.svg"
                            class="max-w-full h-auto rounded-md border shadow-sm"
                            alt="Probhat Keyboard Layout"
                            loading="lazy"
                            decoding="async"
                        />
                    </div>
                </div>
            </div>

            <div class="text-center text-xs text-muted-foreground mt-1">
                <p>
                    <kbd class="px-1.5 py-0.5 bg-muted rounded font-mono">Ctrl+L</kbd> toggle layout
                </p>
            </div>
        </main>
    </body>
</html>
